<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volleyball Rotation Simulator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Volleyball Rotation Simulator</h1>
    <section class="main">
      <div class="volleyball-court">
        <div class="opponent-court">
          <div class="opponent-players">
            <div class="player"></div>
            <div class="player"></div>
            <div class="player"></div>
            <div class="player"></div>
            <div class="player"></div>
            <div class="player"></div>
          </div>
          <div class="attack-line"></div>
        </div>
        <div class="volleyball-net"></div>
        <div class="user-court">
          <div class="attack-line"></div>
          <div class="user-players">
            <div class="player" id="player4">MB1</div>
            <div class="player" id="player5">OH1</div>
            <div class="player" id="player6">S</div>
            <div class="player" id="player3">OP</div>
            <div class="player" id="player2">OH2</div>
            <div class="player" id="player1">MB2</div>
          </div>
        </div>
      </div>
      <button id="moveBtn">Rotate</button>
    </section>

    <script src="script.js"></script>
  </body>
</html>
